<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>노시언 일출·일몰 위젯</title>
<style>
/* ===== 노시언 위젯 공용 기반 CSS ===== */
:root{
  --ink:#37352f; --ink2:rgba(55,53,47,.62); --ink3:rgba(55,53,47,.4); --ink4:rgba(55,53,47,.24);
  --line:rgba(55,53,47,.11); --line2:rgba(55,53,47,.06); --fill:rgba(55,53,47,.045);
  --card:#ffffff; --cardb:rgba(55,53,47,.11);
  --accent:#37352f; --on:#ffffff; --red:#d6483c; --up:#c0392b; --down:#2f6f4e;
  --handle:rgba(55,53,47,.28);
}
@media (prefers-color-scheme: dark){
  :root{
    --ink:#e9e7e3; --ink2:rgba(233,231,227,.62); --ink3:rgba(233,231,227,.4); --ink4:rgba(233,231,227,.22);
    --line:rgba(233,231,227,.13); --line2:rgba(233,231,227,.07); --fill:rgba(233,231,227,.06);
    --card:#1f1e1c; --cardb:rgba(233,231,227,.12);
    --accent:#e9e7e3; --on:#23211e; --red:#ff7369; --up:#ff7369; --down:#4caf86;
    --handle:rgba(233,231,227,.32);
  }
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
html,body{background:transparent; height:100%;}
body{
  font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:var(--ink); -webkit-font-smoothing:antialiased; overflow:hidden; height:100%;
}
.stage{position:fixed; inset:0;}

.card{
  position:absolute; background:var(--card); border:1px solid var(--cardb); border-radius:16px;
  padding:18px; display:flex; flex-direction:column; box-shadow:0 1px 2px rgba(55,53,47,.04);
  touch-action:none; container-type:size;
}
.card.dragging, .card.resizing{box-shadow:0 12px 36px rgba(55,53,47,.16); user-select:none;}

.whead{display:flex; align-items:center; justify-content:space-between; gap:10px; flex:none; margin-bottom:13px; cursor:grab;}
.whead:active{cursor:grabbing;}
.wname{font-size:13.5px; font-weight:600; letter-spacing:-.01em; display:flex; align-items:center; gap:7px; white-space:nowrap;}
.wname .wic{color:var(--ink3); display:flex;}
.wname .wic svg{width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round;}
.wsub{font-size:11.5px; color:var(--ink3); font-weight:500; white-space:nowrap;}

.wbody{flex:1; display:flex; flex-direction:column; justify-content:center; min-height:0;}

.wfoot{flex:none; font-size:11px; color:var(--ink3); margin-top:12px; padding-top:12px; border-top:1px solid var(--line2);
  display:flex; align-items:center; justify-content:space-between; gap:8px;}

.seg{display:inline-flex; background:var(--fill); border-radius:8px; padding:2px; gap:2px; flex:none;}
.seg button{border:0; background:transparent; font:inherit; font-size:11px; font-weight:600; color:var(--ink3);
  padding:4px 9px; border-radius:6px; cursor:pointer; transition:.15s; letter-spacing:-.01em; white-space:nowrap;}
.seg button.on{background:var(--card); color:var(--ink); box-shadow:0 1px 2px rgba(55,53,47,.12);}

.ic{width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:transparent;
  display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink2); transition:.15s; flex:none;}
.ic:hover{background:var(--fill); color:var(--ink);}
.ic:active{transform:scale(.92);}
.ic svg{width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;}

.pill{font-size:11.5px; font-weight:600; color:var(--ink2); border:1px solid var(--line); border-radius:999px;
  padding:5px 11px; cursor:pointer; transition:.15s; white-space:nowrap; background:transparent; display:inline-flex; align-items:center; gap:6px;}
.pill:hover{background:var(--fill);}
.pill.on, .pill.dark{background:var(--accent); color:var(--on); border-color:var(--accent);}

.mono{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}

/* 리사이즈 핸들 (frame.js가 주입) */
.rz{position:absolute; z-index:5;}
.rz.n{top:-4px; left:10px; right:10px; height:8px; cursor:ns-resize;}
.rz.s{bottom:-4px; left:10px; right:10px; height:8px; cursor:ns-resize;}
.rz.e{right:-4px; top:10px; bottom:10px; width:8px; cursor:ew-resize;}
.rz.w{left:-4px; top:10px; bottom:10px; width:8px; cursor:ew-resize;}
.rz.ne{top:-5px; right:-5px; width:14px; height:14px; cursor:nesw-resize;}
.rz.nw{top:-5px; left:-5px; width:14px; height:14px; cursor:nwse-resize;}
.rz.se{bottom:-5px; right:-5px; width:14px; height:14px; cursor:nwse-resize;}
.rz.sw{bottom:-5px; left:-5px; width:14px; height:14px; cursor:nesw-resize;}
.rz.corner::after{content:''; position:absolute; inset:4px; border-radius:50%; background:var(--handle); opacity:0; transition:.15s;}
.card:hover .rz.corner::after{opacity:1;}

.su{display:flex;flex-direction:column;height:100%;}
.su-arc{position:relative;flex:1;min-height:84px;}
.su-arc svg{width:100%;height:100%;display:block;overflow:visible;}
.su-horizon{stroke:var(--line);stroke-width:1.5;}
.su-remain{fill:none;stroke:var(--line);stroke-width:3;stroke-linecap:round;}
.su-travel{fill:none;stroke:var(--ink);stroke-width:3;stroke-linecap:round;}
.su-times{display:flex;justify-content:space-between;align-items:flex-start;flex:none;margin-top:2px;}
.su-times .l{font-size:11.5px;color:var(--ink3);font-weight:600;margin-bottom:3px;}
.su-times .v{font-size:clamp(20px,8cqw,28px);font-weight:800;letter-spacing:-.02em;line-height:1;}
.su-times .r{text-align:right;}
.su-count{text-align:center;font-size:12.5px;font-weight:700;color:var(--ink);flex:none;margin-top:7px;}
.su-meta{flex:none;margin-top:13px;padding-top:13px;border-top:1px solid var(--line2);display:flex;flex-direction:column;gap:8px;}
.su-mrow{display:flex;justify-content:space-between;font-size:12.5px;align-items:baseline;}
.su-mrow .ml{color:var(--ink3);font-weight:500;}
.su-mrow .mv{font-weight:700;letter-spacing:-.01em;white-space:nowrap;}
.su-foot{flex:none;text-align:center;font-size:11px;color:var(--ink3);margin-top:11px;display:flex;align-items:center;justify-content:center;gap:5px;}
.su-foot svg{flex:none;stroke:var(--ink3);}

  /* 기본 크기 리셋 버튼 (테두리 바깥 오른쪽 위, 호버 시 표시) */
  .wreset{position:absolute; top:6px; right:-38px; width:28px; height:28px; border-radius:50%;
    border:1px solid var(--cardb); background:var(--card); color:var(--ink2);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    opacity:0; pointer-events:none; transition:opacity .15s, color .15s, background .15s, transform .1s;
    box-shadow:0 2px 8px rgba(55,53,47,.14); z-index:6; padding:0;}
  .wreset:hover{color:var(--ink); background:var(--fill);}
  .wreset:active{transform:scale(.9);}
  .wreset svg{width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;}

</style>
<link rel="preconnect" href="https://cdn.jsdelivr.net"><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
</head>
<body>
<div class="stage">
  <div class="card" id="w">
    <div class="whead">
      <div class="wname">오늘의 해</div>
    </div>
    <div class="wbody" id="body"><div class="su">
      <div class="su-arc">
        <svg id="arcsvg" viewBox="0 0 300 165" preserveAspectRatio="xMidYMax meet">
          <line class="su-horizon" x1="8" y1="150" x2="292" y2="150"></line>
          <path id="arcRemain" class="su-remain" d=""></path>
          <path id="arcTravel" class="su-travel" d=""></path>
          <g id="sunG"></g>
        </svg>
      </div>
      <div class="su-times">
        <div><div class="l">일출</div><div class="v mono" id="riseT">–</div></div>
        <div class="r"><div class="l">일몰</div><div class="v mono" id="setT">–</div></div>
      </div>
      <div class="su-count" id="countT"></div>
      <div class="su-meta">
        <div class="su-mrow"><span class="ml">낮 길이</span><span class="mv mono" id="dayLen">–</span></div>
        <div class="su-mrow"><span class="ml">남중 시각</span><span class="mv mono" id="noonT">–</span></div>
      </div>
      <div class="su-foot"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-6-5.3-6-10a6 6 0 0 1 12 0c0 4.7-6 10-6 10z"></path><circle cx="12" cy="11" r="2"></circle></svg><span id="locT">위치 확인 중…</span></div>
    </div></div>
  </div>
</div>
<script>
/* ===== 노시언 위젯 공용 프레임 — 드래그 이동 + 8방향 리사이즈 + 위치/크기 저장 ===== */
(function(){
  function init(opts){
    opts = opts || {};
    var card = opts.card || document.querySelector('.card');
    var head = opts.head || card.querySelector('.whead');
    var KEY  = opts.key || 'nosion-frame';
    var MINW = opts.minW || 230, MINH = opts.minH || 210;
    var DEFW = opts.defaultW || 340, DEFH = opts.defaultH || 300;

    // 핸들 주입
    ['n','s','e','w','ne','nw','se','sw'].forEach(function(d){
      var el = document.createElement('div');
      el.className = 'rz ' + d + (d.length===2 ? ' corner' : '');
      el.setAttribute('data-rz', d);
      card.appendChild(el);
    });

    var frame = loadFrame();
    function loadFrame(){
      try { var f = JSON.parse(localStorage.getItem(KEY)); if (f && f.w) return f; } catch(e){}
      var w = Math.min(DEFW, window.innerWidth - 28);
      var h = Math.min(DEFH, window.innerHeight - 28);
      return { x:(window.innerWidth-w)/2, y:Math.max(14,(window.innerHeight-h)/2), w:w, h:h };
    }
    function clampFrame(){
      frame.w = Math.max(MINW, Math.min(frame.w, window.innerWidth - 8));
      frame.h = Math.max(MINH, Math.min(frame.h, window.innerHeight - 8));
      frame.x = Math.max(4, Math.min(frame.x, window.innerWidth - frame.w - 4));
      frame.y = Math.max(4, Math.min(frame.y, window.innerHeight - frame.h - 4));
    }
    function applyFrame(){
      clampFrame();
      card.style.left=frame.x+'px'; card.style.top=frame.y+'px';
      card.style.width=frame.w+'px'; card.style.height=frame.h+'px';
    }
    function saveFrame(){ try{ localStorage.setItem(KEY, JSON.stringify(frame)); }catch(e){} }

    // 드래그 이동 (헤더). 버튼·세그·인터랙션 요소 위에서는 무시
    head.addEventListener('pointerdown', function(e){
      if (e.target.closest('.seg, .ic, .pill, button, input, a, [data-nodrag]')) return;
      startDrag(e);
    });
    card.querySelectorAll('.rz').forEach(function(hd){
      hd.addEventListener('pointerdown', function(e){ startResize(e, hd.getAttribute('data-rz')); });
    });
    function startDrag(e){
      e.preventDefault(); card.classList.add('dragging');
      var sx=e.clientX, sy=e.clientY, ox=frame.x, oy=frame.y;
      function move(ev){ frame.x=ox+(ev.clientX-sx); frame.y=oy+(ev.clientY-sy); applyFrame(); }
      function up(){ card.classList.remove('dragging'); saveFrame(); document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); }
      document.addEventListener('pointermove',move); document.addEventListener('pointerup',up);
    }
    function startResize(e, dir){
      e.preventDefault(); e.stopPropagation(); card.classList.add('resizing');
      var sx=e.clientX, sy=e.clientY, o={x:frame.x,y:frame.y,w:frame.w,h:frame.h};
      function move(ev){
        var dx=ev.clientX-sx, dy=ev.clientY-sy;
        if (dir.indexOf('e')>=0){ frame.w=Math.max(MINW,o.w+dx); }
        if (dir.indexOf('s')>=0){ frame.h=Math.max(MINH,o.h+dy); }
        if (dir.indexOf('w')>=0){ var nw=Math.max(MINW,o.w-dx); frame.x=o.x+(o.w-nw); frame.w=nw; }
        if (dir.indexOf('n')>=0){ var nh=Math.max(MINH,o.h-dy); frame.y=o.y+(o.h-nh); frame.h=nh; }
        applyFrame();
      }
      function up(){ card.classList.remove('resizing'); saveFrame(); document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); }
      document.addEventListener('pointermove',move); document.addEventListener('pointerup',up);
    }
    window.addEventListener('resize', applyFrame);
    applyFrame();
  }
  window.NosionFrame = { init: init };
})();

</script>
<script>
(function(){
  var rad=Math.PI/180;
  function dateToJulian(d){return d.valueOf()/86400000 + 2440587.5;}
  function julianToDate(J){return new Date((J - 2440587.5)*86400000);}
  function sunCalc(date, lat, lng){
    var Jdate=dateToJulian(date);
    var n=Math.round(Jdate - 2451545.0 + 0.0008);
    var Jstar=n - lng/360;
    var M=(357.5291 + 0.98560028*Jstar)%360;
    var Mr=M*rad;
    var C=1.9148*Math.sin(Mr)+0.0200*Math.sin(2*Mr)+0.0003*Math.sin(3*Mr);
    var lambda=((M + C + 180 + 102.9372)%360)*rad;
    var Jtransit=2451545.0 + Jstar + 0.0053*Math.sin(Mr) - 0.0069*Math.sin(2*lambda);
    var sinDelta=Math.sin(lambda)*Math.sin(23.44*rad);
    var cosDelta=Math.cos(Math.asin(sinDelta));
    var cosOmega=(Math.sin(-0.83*rad)-Math.sin(lat*rad)*sinDelta)/(Math.cos(lat*rad)*cosDelta);
    var omega=Math.acos(Math.max(-1,Math.min(1,cosOmega)))/rad;
    return {
      rise:julianToDate(Jtransit - omega/360),
      set:julianToDate(Jtransit + omega/360),
      noon:julianToDate(Jtransit)
    };
  }
  function hm(d){return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}

  var CX=150,CY=150,R=130;
  function ptOnArc(t){ var ang=180*(1-t)*rad; return [CX+R*Math.cos(ang), CY-R*Math.sin(ang)]; }
  function arcPath(t0,t1){
    var p0=ptOnArc(t0),p1=ptOnArc(t1);
    return 'M'+p0[0].toFixed(1)+' '+p0[1].toFixed(1)+' A'+R+' '+R+' 0 0 1 '+p1[0].toFixed(1)+' '+p1[1].toFixed(1);
  }
  function sunGlyph(x,y,t){
    // 고도(정오=1, 일출/일몰=0)에 따라 반짝임이 변화
    var alt=Math.max(0,Math.min(1,Math.sin(Math.max(0,Math.min(1,t))*Math.PI)));
    var core=4.5+alt*2;           // 해 크기
    var rayIn=core+2.5;           // 광선 시작
    var rayOut=rayIn+2.5+alt*6;   // 광선 끝 (정오에 길게)
    var op=(0.4+alt*0.6).toFixed(2); // 광선 밝기
    var sw=(1.6+alt*0.7).toFixed(2);
    var rays='';
    for(var i=0;i<8;i++){var a=i*45*rad;rays+='<line x1="'+(x+Math.cos(a)*rayIn).toFixed(1)+'" y1="'+(y+Math.sin(a)*rayIn).toFixed(1)+'" x2="'+(x+Math.cos(a)*rayOut).toFixed(1)+'" y2="'+(y+Math.sin(a)*rayOut).toFixed(1)+'"/>';}
    // 정오 근처엔 대각선 보조 광선 추가(더 반짝)
    var rays2='';
    if(alt>0.55){var op2=((alt-0.55)*1.3).toFixed(2);for(var j=0;j<8;j++){var a2=(j*45+22.5)*rad;rays2+='<line x1="'+(x+Math.cos(a2)*rayIn).toFixed(1)+'" y1="'+(y+Math.sin(a2)*rayIn).toFixed(1)+'" x2="'+(x+Math.cos(a2)*(rayIn+3+alt*3)).toFixed(1)+'" y2="'+(y+Math.sin(a2)*(rayIn+3+alt*3)).toFixed(1)+'"/>';}rays2='<g stroke="var(--ink)" stroke-width="'+sw+'" stroke-linecap="round" opacity="'+op2+'">'+rays2+'</g>';}
    return '<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+core.toFixed(1)+'" fill="var(--card)" stroke="var(--ink)" stroke-width="2"/><g stroke="var(--ink)" stroke-width="'+sw+'" stroke-linecap="round" opacity="'+op+'">'+rays+'</g>'+rays2;
  }
  function dot(x,y){ return '<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="5" fill="var(--ink4)"/>'; }

  function render(lat,lng,place){
    var now=new Date();
    var s=sunCalc(now, lat, lng);
    document.getElementById('riseT').textContent=hm(s.rise);
    document.getElementById('setT').textContent=hm(s.set);
    document.getElementById('noonT').textContent=hm(s.noon);
    var lenMin=Math.round((s.set-s.rise)/60000); if(lenMin<0)lenMin+=1440;
    document.getElementById('dayLen').textContent=Math.floor(lenMin/60)+'시간 '+(lenMin%60)+'분';
    var t=(now.getTime()-s.rise.getTime())/(s.set.getTime()-s.rise.getTime());
    var tc=Math.max(0,Math.min(1,t));
    var sp=ptOnArc(tc);
    document.getElementById('arcRemain').setAttribute('d',arcPath(0,1));
    document.getElementById('arcTravel').setAttribute('d',arcPath(0,tc));
    var isDay=(t>=0&&t<=1);
    document.getElementById('sunG').innerHTML=isDay?sunGlyph(sp[0],sp[1],t):dot(ptOnArc(t<0?0:1)[0],ptOnArc(t<0?0:1)[1]);
    var cEl=document.getElementById('countT');
    if(t<0){var m=Math.round((s.rise-now)/60000);cEl.textContent='일출까지 '+Math.floor(m/60)+'시간 '+(m%60)+'분';}
    else if(t>1){cEl.textContent='해가 졌어요';}
    else {var m2=Math.round((s.set-now)/60000);cEl.textContent='일몰까지 '+Math.floor(m2/60)+'시간 '+(m2%60)+'분';}
    var DOW=['일','월','화','수','목','금','토'];
    var dstr=(now.getMonth()+1)+'월 '+now.getDate()+'일 ('+DOW[now.getDay()]+')';
    document.getElementById('locT').textContent=(place||'현재 위치')+' · '+dstr;
  }

  var CURLAT=37.5665,CURLNG=126.9780,CURPLACE='서울특별시';
  function go(lat,lng,place){CURLAT=lat;CURLNG=lng;CURPLACE=place;render(lat,lng,place);}
  function reverseName(lat,lng,cb){
    fetch('https://nominatim.openstreetmap.org/reverse?format=json&zoom=10&lat='+lat+'&lon='+lng+'&accept-language=ko')
      .then(function(r){return r.json();}).then(function(j){var a=j.address||{};cb(a.city||a.town||a.county||a.state||null);}).catch(function(){cb(null);});
  }
  function ipFallback(){
    fetch('https://ipapi.co/json/').then(function(r){return r.json();}).then(function(j){
      if(j&&j.latitude){go(j.latitude,j.longitude,j.city||j.region||'현재 위치');}
      else{go(37.5665,126.9780,'서울특별시');}
    }).catch(function(){go(37.5665,126.9780,'서울특별시');});
  }
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(pos){
      var la=pos.coords.latitude,lo=pos.coords.longitude;
      CURLAT=la;CURLNG=lo;render(la,lo,'현재 위치');
      reverseName(la,lo,function(nm){go(la,lo,nm||'현재 위치');});
    },function(){ipFallback();},{timeout:8000,maximumAge:600000});
  } else { ipFallback(); }
  setInterval(function(){render(CURLAT,CURLNG,CURPLACE);},60000);
})();
NosionFrame.init({ card: document.getElementById('w'), key:'nosion-sunrise-frame', minW:260, minH:280, defaultW:330, defaultH:310 });
</script>
<script>
(function(){
  var root=document.getElementById('w'); if(!root) return;
  var btn=document.createElement('button');
  btn.className='wreset'; btn.title='기본 크기로';
  btn.setAttribute('aria-label','기본 크기로');
  btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M9 21H3v-6M3 21l7-7M15 3h6v6M21 3l-7 7"/></svg>';
  btn.addEventListener('pointerdown',function(e){e.stopPropagation();});
  btn.addEventListener('click',function(e){e.stopPropagation();try{localStorage.removeItem('nosion-sunrise-frame');}catch(_){}location.reload();});
  root.appendChild(btn);
  var hideT;
  function show(){clearTimeout(hideT);btn.style.opacity='1';btn.style.pointerEvents='auto';}
  function hideSoon(){hideT=setTimeout(function(){btn.style.opacity='0';btn.style.pointerEvents='none';},260);}
  root.addEventListener('pointerenter',show);
  root.addEventListener('pointerleave',hideSoon);
  btn.addEventListener('pointerenter',show);
  btn.addEventListener('pointerleave',hideSoon);
})();
</script>
</body>
</html>
